<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>🔗 The Chain — 90 Day Sprint</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0a0a0f; }
    body { -webkit-font-smoothing: antialiased; font-family: Georgia, serif; }
    textarea, input { font-family: Georgia, serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0a0f; }
    ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 2px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
    @keyframes chainGlow { 0%, 100% { box-shadow: 0 0 8px rgba(212,175,55,0.3); } 50% { box-shadow: 0 0 20px rgba(212,175,55,0.6); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.4s ease both; }
    .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,15,0.97); border-top: 1px solid #1a1a2a; display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
    .tab-btn { flex: 1; padding: 10px 4px 8px; background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; color: #3a3a5a; transition: color 0.2s; font-family: Georgia, serif; }
    .tab-btn.active { color: #d4af37; }
    .tab-btn span:first-child { font-size: 20px; }
    .tab-btn span:last-child { font-size: 9px; letter-spacing: 0.5px; text-transform: uppercase; }
    .page { padding: 20px 16px 100px; max-width: 480px; margin: 0 auto; min-height: 100vh; }
    .section-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #4a4a6a; margin-bottom: 12px; padding-left: 2px; }
    .card { border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid; animation: fadeIn 0.3s ease both; }
    .card-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .card textarea { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 10px 12px; color: #e0e0e0; font-size: 14px; line-height: 1.6; resize: none; min-height: 80px; transition: border-color 0.2s; }
    .card textarea:focus { outline: none; border-color: rgba(255,255,255,0.15); }
    .having-audit-card { background: linear-gradient(135deg, #1a1510 0%, #0f1a0f 100%); border-color: #3d3020; }
    .having-item { background: rgba(0,0,0,0.3); border: 1px solid rgba(212,175,55,0.12); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .having-item-num { font-size: 10px; color: #d4af37; opacity: 0.6; min-width: 16px; }
    .having-item input { flex: 1; background: none; border: none; color: #e0d5b0; font-size: 14px; font-family: Georgia, serif; outline: none; line-height: 1.6; }
    .having-item input::placeholder { color: #3a3220; }
    .mantra-bar { background: rgba(212,175,55,0.05); border: 1px solid rgba(212,175,55,0.15); border-radius: 8px; padding: 10px 14px; text-align: center; margin-top: 10px; }
    .mantra-bar p { font-size: 12px; color: #d4af37; opacity: 0.7; letter-spacing: 0.5px; font-style: italic; }
    .habit-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 10px; margin-bottom: 6px; cursor: pointer; border: 1px solid transparent; transition: all 0.2s; user-select: none; }
    .habit-row:active { transform: scale(0.98); }
    .habit-check { width: 22px; height: 22px; border-radius: 6px; border: 2px solid; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all 0.2s; }
    .habit-icon { font-size: 18px; }
    .habit-label { font-size: 14px; flex: 1; line-height: 1.3; }
    .chain-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 5px; margin-bottom: 20px; }
    .chain-day { aspect-ratio: 1; border-radius: 6px; border: 1px solid #1a1a2a; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #2a2a4a; cursor: pointer; transition: all 0.2s; }
    .chain-day.complete { background: #1a2e1a; border-color: #2d5a27; color: #5cb85c; animation: chainGlow 3s ease-in-out infinite; }
    .chain-day.partial { background: #2e2a0a; border-color: #5a4a0a; color: #d4af37; }
    .chain-day.today { border-color: #8b5cf6; border-width: 2px; }
    .chain-day.future { opacity: 0.3; }
    .stat-row { display: flex; gap: 10px; margin-bottom: 20px; }
    .stat-box { flex: 1; background: #0e0e18; border: 1px solid #1a1a2a; border-radius: 10px; padding: 14px 10px; text-align: center; }
    .stat-num { font-size: 28px; color: #d4af37; letter-spacing: -1px; }
    .stat-label { font-size: 9px; color: #3a3a5a; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
    .affirmation-bar { background: linear-gradient(90deg, #8b5cf6 0%, #d946ef 50%, #f59e0b 100%); background-size: 200% auto; animation: shimmer 4s linear infinite; border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; text-align: center; }
    .affirmation-bar p { font-size: 13px; color: white; font-style: italic; letter-spacing: 0.3px; }
    .btn { width: 100%; padding: 14px; border-radius: 10px; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; font-family: Georgia, serif; border: 1px solid; margin-top: 8px; }
    .btn:active { transform: scale(0.98); opacity: 0.8; }
    .btn-green { background: linear-gradient(135deg, #1a2e1a, #1a1a2e); border-color: #2d5a27; color: #a8e6a3; }
    .btn-green.saved { border-color: #5cb85c; color: #5cb85c; }
    .btn-notion { background: linear-gradient(135deg, #1a1020, #0d1520); border-color: #3d2060; color: #c4b5fd; }
    .btn-notion:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-gold { background: linear-gradient(135deg, #1a1510, #1a1a0a); border-color: #4a3a10; color: #d4af37; }
    .btn-red { background: linear-gradient(135deg, #1a0a0a, #200a0a); border-color: #4a1010; color: #f87171; }
    .sync-status { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 8px; margin-top: 8px; font-size: 12px; }
    .sync-status.success { background: rgba(92,184,92,0.1); border: 1px solid rgba(92,184,92,0.2); color: #5cb85c; }
    .sync-status.error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2); color: #f87171; }
    .sync-status.syncing { background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.2); color: #c4b5fd; }
    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(196,181,253,0.3); border-top-color: #c4b5fd; border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
    .why-textarea { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid #2a2a3a; border-radius: 10px; padding: 16px; color: #c0c0d0; font-size: 15px; line-height: 1.8; resize: none; min-height: 120px; }
    .why-textarea:focus { outline: none; border-color: #3a3a5a; }
    .quit-protocol { background: #1a0f0f; border: 1px solid #3a1a1a; border-radius: 12px; padding: 16px; margin-top: 16px; }
    .quit-step { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid #2a1a1a; align-items: flex-start; }
    .quit-step:last-child { border-bottom: none; }
    .quit-num { width: 24px; height: 24px; border-radius: 50%; background: #2a1a1a; border: 1px solid #3a2a2a; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #f59e0b; flex-shrink: 0; }
    .quit-text { font-size: 13px; color: #8a7a7a; line-height: 1.5; }
    .weekly-reflection { background: linear-gradient(135deg, #0f1520 0%, #150f20 100%); border: 1px solid #2a2040; border-radius: 12px; padding: 16px; margin-top: 16px; }
    .weekly-reflection h3 { font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: #8b5cf6; margin-bottom: 8px; }
    .weekly-reflection p { font-size: 13px; color: #5a5a7a; line-height: 1.6; margin-bottom: 10px; }
    .weekly-reflection textarea { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(139,92,246,0.15); border-radius: 8px; padding: 10px 12px; color: #c4b5fd; font-size: 13px; line-height: 1.6; resize: none; min-height: 80px; font-family: Georgia, serif; }
    .weekly-reflection textarea:focus { outline: none; border-color: rgba(139,92,246,0.3); }
    .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 14px; background: #0e0e18; border: 1px solid #1a1a2a; border-radius: 10px; margin-bottom: 8px; }
    .settings-label { font-size: 13px; color: #8a8aaa; }
    .settings-input { background: rgba(0,0,0,0.4); border: 1px solid #2a2a3a; border-radius: 6px; padding: 6px 10px; color: #c0c0d0; font-size: 12px; font-family: Georgia, serif; width: 180px; }
    .settings-input:focus { outline: none; border-color: #8b5cf6; }
    .progress-bar { background: #1a1a2a; border-radius: 8px; height: 6px; margin-bottom: 6px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 8px; background: linear-gradient(90deg, #5cb85c, #8b5cf6, #d4af37); transition: width 0.4s ease; }
    .day-detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; display: flex; align-items: flex-end; }
    .day-detail-sheet { background: #0e0e18; border-top: 1px solid #2a2a3a; border-radius: 20px 20px 0 0; padding: 20px 16px; width: 100%; max-height: 60vh; overflow-y: auto; animation: fadeIn 0.25s ease; position: relative; }
    .day-detail-sheet h2 { font-size: 16px; color: #d4af37; margin-bottom: 12px; }
    .close-btn { position: absolute; top: 16px; right: 16px; background: #1a1a2a; border: 1px solid #2a2a3a; border-radius: 50%; width: 32px; height: 32px; color: #6a6a8a; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const NOTION_DB_ID = "7b3d8411c58245f2ad07bb962d7fa2d8";
    const FUNCTION_URL = "/.netlify/functions/notion-sync";

    function getStartDate() {
      const s = localStorage.getItem("chain_start");
      return s ? new Date(s) : null;
    }

    const HABITS = [
      { id: "eat_well",        label: "Eat well / no alcohol (social OK)",  category: "75soft",  icon: "🥗" },
      { id: "workout",         label: "45 min workout (or active recovery)", category: "75soft",  icon: "💪" },
      { id: "water",           label: "Drink 3 litres of water",             category: "75soft",  icon: "💧" },
      { id: "read",            label: "Read 10 pages",                       category: "75soft",  icon: "📖" },
      { id: "progress_photo",  label: "Weekly progress photo",               category: "75soft",  icon: "📸", weekly: true },
      { id: "bob_am",          label: "Bob Proctor Abundance (Morning)",     category: "mindset", icon: "🌅" },
      { id: "bob_pm",          label: "Bob Proctor Abundance (Evening)",     category: "mindset", icon: "🌙" },
      { id: "mckenna",         label: "Paul McKenna Hypnosis (rotating)",    category: "mindset", icon: "🎧" },
      { id: "lisa",            label: "Lisa Nichols Abundance Meditation",   category: "mindset", icon: "✨" },
      { id: "morning_checkin", label: "Morning Check-in",                    category: "checkin", icon: "☀️" },
      { id: "evening_checkin", label: "Evening Check-in",                    category: "checkin", icon: "🌜" },
    ];

    const CATEGORY_LABELS = { "75soft": "75 Soft Challenge", "mindset": "Mindset Stack", "checkin": "Daily Check-ins" };
    const CATEGORY_COLORS = {
      "75soft":  { bg: "#1a2e1a", border: "#2d5a27", accent: "#5cb85c", text: "#a8e6a3" },
      "mindset": { bg: "#1a1a2e", border: "#2d2757", accent: "#8b5cf6", text: "#c4b5fd" },
      "checkin": { bg: "#2e1a1a", border: "#572727", accent: "#f59e0b", text: "#fcd34d" },
    };

    const WHY_DEFAULT = "Discipline is a form of self-love. I am proving to myself that I can do this — 90 days, not 3. My future self is watching.";

    const AFFIRMATIONS = [
      "I don't decide if I do it. I just do it.",
      "Discipline is a form of self-love.",
      "The chain doesn't break today.",
      "I am building the person I want to become.",
      "Every day I show up, I prove the old story wrong.",
      "My future self is watching. I won't let them down.",
      "I do hard things. That's who I am now.",
    ];

    const HAVING_PROMPTS = [
      "What physical thing around you right now proves you are provided for?",
      "What skill or knowledge do you carry that money cannot take away?",
      "What relationship in your life shows you are loved and supported?",
      "What moment from yesterday proved your needs were met?",
      "What tool or resource do you have that would have amazed you 5 years ago?",
      "What about your home — your space — shows you have enough?",
      "What creative capacity do you have right now that is already wealth?",
    ];

    const CHECKIN_PROMPTS = [
      { id: "gratitude", icon: "🌱", label: "Gratitude",          question: "What am I genuinely grateful for this morning?",               hint: "Be specific. Not 'my health' — what about your health, right now?",  color: "#1a2e1a", border: "#2d5a27", accent: "#5cb85c", text: "#a8e6a3" },
      { id: "intention", icon: "🎯", label: "Intention",          question: "What is the ONE thing that would make today a win?",            hint: "Not a list. One thing. If nothing else happens, this.",               color: "#1a1a2e", border: "#2d2757", accent: "#8b5cf6", text: "#c4b5fd" },
      { id: "identity",  icon: "🔗", label: "Identity",           question: "Who am I becoming by doing this today?",                        hint: "Connect the habit to the person — not the outcome.",                 color: "#2e1a2e", border: "#4a2757", accent: "#d946ef", text: "#f0abfc" },
      { id: "block",     icon: "🧠", label: "Mental Block Check", question: "Is there a voice trying to negotiate today? What is it saying?", hint: "Name it. Once you name it, you own it. It doesn't own you.",         color: "#2e1a1a", border: "#572727", accent: "#f59e0b", text: "#fcd34d" },
      { id: "tarot",     icon: "🃏", label: "Daily Tarot",        question: "What energy am I bringing into today?",                         hint: "Pull one card. Sit with it for 60 seconds. No over-analysis.",       color: "#1a1520", border: "#2d1f40", accent: "#a78bfa", text: "#ddd6fe" },
    ];

    const todayKey = () => new Date().toISOString().slice(0, 10);
    const getDayData      = d => { try { return JSON.parse(localStorage.getItem("chain_day_" + d) || "{}"); } catch { return {}; } };
    const saveDayData     = (d, v) => localStorage.setItem("chain_day_" + d, JSON.stringify(v));
    const getCheckinData  = d => { try { return JSON.parse(localStorage.getItem("chain_checkin_" + d) || "{}"); } catch { return {}; } };
    const saveCheckinData = (d, v) => localStorage.setItem("chain_checkin_" + d, JSON.stringify(v));
    const getHavingData   = d => { try { return JSON.parse(localStorage.getItem("chain_having_" + d) || "{}"); } catch { return {}; } };
    const saveHavingData  = (d, v) => localStorage.setItem("chain_having_" + d, JSON.stringify(v));

    function getCurrentDay() {
      const start = getStartDate();
      if (!start) return 1;
      const diff = Math.floor((new Date() - start) / 86400000);
      return Math.max(1, Math.min(diff + 1, 90));
    }

    function getDayCompletion(dateStr) {
      const data = getDayData(dateStr);
      const total = HABITS.filter(h => !h.weekly).length;
      const done = HABITS.filter(h => !h.weekly && data[h.id]).length;
      if (done === 0) return "empty";
      if (done === total) return "complete";
      return "partial";
    }

    async function syncToNotion(date, checkin, having, dayData, dayNum) {
      const key = localStorage.getItem("chain_notion_key") || "";
      if (!key) throw new Error("No Notion API key. Add it in My Why → Settings.");
      const total = HABITS.filter(h => !h.weekly).length;
      const done  = HABITS.filter(h => !h.weekly && dayData[h.id]).length;
      const status = done === total ? "Complete" : done > 0 ? "Partial" : "Missed";

      const properties = {
        Date:              { title: [{ text: { content: date } }] },
        Day:               { number: dayNum },
        Gratitude:         { rich_text: [{ text: { content: checkin.gratitude || "" } }] },
        Intention:         { rich_text: [{ text: { content: checkin.intention || "" } }] },
        Identity:          { rich_text: [{ text: { content: checkin.identity || "" } }] },
        "Mental Block":    { rich_text: [{ text: { content: checkin.block || "" } }] },
        Tarot:             { rich_text: [{ text: { content: checkin.tarot || "" } }] },
        "Having 1":        { rich_text: [{ text: { content: having.item1 || "" } }] },
        "Having 2":        { rich_text: [{ text: { content: having.item2 || "" } }] },
        "Having 3":        { rich_text: [{ text: { content: having.item3 || "" } }] },
        "Habits Complete": { number: done },
        "Chain Status":    { select: { name: status } },
      };

      const res = await fetch(FUNCTION_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ notionKey: key, databaseId: NOTION_DB_ID, properties }),
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Sync failed");
    }

    function exportData() {
      const keys = Object.keys(localStorage).filter(k => k.startsWith("chain_"));
      const data = {};
      keys.forEach(k => { data[k] = localStorage.getItem(k); });
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "the-chain-backup-" + todayKey() + ".json";
      a.click(); URL.revokeObjectURL(url);
    }

    function importData(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => {
          try {
            const data = JSON.parse(e.target.result);
            Object.entries(data).forEach(([k, v]) => localStorage.setItem(k, v));
            resolve(Object.keys(data).length);
          } catch { reject(new Error("Invalid file")); }
        };
        reader.readAsText(file);
      });
    }

    function MorningTab() {
      const date = todayKey();
      const dayNum = getCurrentDay();
      const [checkin, setCheckin] = useState(() => getCheckinData(date));
      const [having, setHaving]   = useState(() => getHavingData(date));
      const [saved, setSaved]     = useState(false);
      const [syncState, setSyncState] = useState(null);
      const [syncMsg, setSyncMsg] = useState("");
      const isWeek7 = dayNum > 0 && dayNum % 7 === 0;

      const updateCheckin = (id, val) => setCheckin(p => ({ ...p, [id]: val }));
      const updateHaving  = (k, val)  => setHaving(p => ({ ...p, [k]: val }));

      const handleSave = () => {
        saveCheckinData(date, checkin); saveHavingData(date, having);
        const d = getDayData(date); d.morning_checkin = true; saveDayData(date, d);
        setSaved(true); setTimeout(() => setSaved(false), 2500);
      };

      const handleSync = async () => {
        setSyncState("syncing"); setSyncMsg("Syncing to Notion...");
        try {
          saveCheckinData(date, checkin); saveHavingData(date, having);
          await syncToNotion(date, checkin, having, getDayData(date), dayNum);
          setSyncState("success"); setSyncMsg("✓ Saved to your Notion Second Brain");
          setTimeout(() => setSyncState(null), 4000);
        } catch(e) {
          setSyncState("error"); setSyncMsg(e.message);
          setTimeout(() => setSyncState(null), 6000);
        }
      };

      return (
        <div className="page fade-in">
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 11, color: "#4a4a6a", letterSpacing: 2, textTransform: "uppercase" }}>Day {dayNum} of 90</div>
            <div style={{ fontSize: 24, color: "#d4af37", marginTop: 4 }}>Morning Check-in</div>
          </div>
          <div className="affirmation-bar"><p>{AFFIRMATIONS[dayNum % AFFIRMATIONS.length]}</p></div>
          <div className="section-title">Reflection Prompts</div>
          {CHECKIN_PROMPTS.map((p, i) => (
            <div key={p.id} className="card" style={{ background: p.color, borderColor: p.border, animationDelay: `${i * 0.06}s` }}>
              <div className="card-label" style={{ color: p.accent }}><span>{p.icon}</span><span>{p.label}</span></div>
              <div style={{ fontSize: 13, color: p.text, marginBottom: 8, lineHeight: 1.5 }}>{p.question}</div>
              <textarea rows={3} value={checkin[p.id] || ""} onChange={e => updateCheckin(p.id, e.target.value)} placeholder={p.hint} style={{ borderColor: p.border + "80" }} />
            </div>
          ))}
          <div className="section-title" style={{ marginTop: 20 }}>Evidence of Plenty</div>
          <div className="card having-audit-card" style={{ animationDelay: "0.3s" }}>
            <div className="card-label" style={{ color: "#d4af37" }}><span>🪙</span><span>Having Audit</span></div>
            <div style={{ fontSize: 13, color: "#c9b87a", marginBottom: 12, lineHeight: 1.6 }}>{HAVING_PROMPTS[dayNum % HAVING_PROMPTS.length]}</div>
            {[1,2,3].map(n => (
              <div key={n} className="having-item">
                <span className="having-item-num">{n}.</span>
                <input type="text" value={having["item"+n] || ""} onChange={e => updateHaving("item"+n, e.target.value)} placeholder="I already have..." />
              </div>
            ))}
            <div className="mantra-bar"><p>I do not need; I prefer. I am already whole.</p></div>
          </div>
          {isWeek7 && (
            <div className="weekly-reflection">
              <h3>✦ Week {Math.floor(dayNum / 7)} Reflection</h3>
              <p>Look back at this week's Evidence of Plenty. How did your relationship with spending and receiving feel different?</p>
              <textarea rows={4} value={having.weeklyReflection || ""} onChange={e => updateHaving("weeklyReflection", e.target.value)} placeholder="This week I noticed..." />
            </div>
          )}
          <button className={`btn btn-green ${saved ? "saved" : ""}`} onClick={handleSave} style={{ marginTop: 20 }}>
            {saved ? "✓ Saved locally" : "Save Morning Check-in"}
          </button>
          <button className="btn btn-notion" onClick={handleSync} disabled={syncState === "syncing"}>
            {syncState === "syncing" ? "Syncing..." : "↗ Sync to Notion"}
          </button>
          {syncState && (
            <div className={`sync-status ${syncState}`}>
              {syncState === "syncing" && <span className="spinner" />}
              <span>{syncMsg}</span>
            </div>
          )}
        </div>
      );
    }

    function TodayTab() {
      const date = todayKey();
      const [habits, setHabits] = useState(() => getDayData(date));
      const toggle = id => { const u = { ...habits, [id]: !habits[id] }; setHabits(u); saveDayData(date, u); };
      const total = HABITS.filter(h => !h.weekly).length;
      const done  = HABITS.filter(h => !h.weekly && habits[h.id]).length;
      const pct   = Math.round((done / total) * 100);
      return (
        <div className="page fade-in">
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 11, color: "#4a4a6a", letterSpacing: 2, textTransform: "uppercase" }}>Day {getCurrentDay()} of 90</div>
            <div style={{ fontSize: 24, color: "#d4af37", marginTop: 4 }}>Today's Habits</div>
          </div>
          <div className="progress-bar"><div className="progress-fill" style={{ width: pct + "%" }} /></div>
          <div style={{ fontSize: 11, color: "#4a4a6a", textAlign: "right", marginBottom: 20 }}>{done}/{total} · {pct}%</div>
          {["75soft","mindset","checkin"].map(cat => {
            const c = CATEGORY_COLORS[cat];
            return (
              <div key={cat} style={{ marginBottom: 20 }}>
                <div className="section-title" style={{ color: c.accent }}>{CATEGORY_LABELS[cat]}</div>
                {HABITS.filter(h => h.category === cat).map(h => {
                  const checked = !!habits[h.id];
                  return (
                    <div key={h.id} className="habit-row" style={{ background: checked ? c.bg : "#0e0e18", borderColor: checked ? c.border : "transparent" }} onClick={() => toggle(h.id)}>
                      <div className="habit-check" style={{ borderColor: checked ? c.accent : "#2a2a3a", background: checked ? c.bg : "transparent", color: c.accent }}>{checked ? "✓" : ""}</div>
                      <span className="habit-icon">{h.icon}</span>
                      <span className="habit-label" style={{ color: checked ? c.text : "#5a5a7a" }}>{h.label}{h.weekly && <span style={{ fontSize: 10, color: "#3a3a5a", marginLeft: 6 }}>weekly</span>}</span>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      );
    }

    function ChainTab() {
      const [selected, setSelected] = useState(null);
      const startDate  = getStartDate() || new Date();
      const currentDay = getCurrentDay();
      const days = Array.from({ length: 90 }, (_, i) => {
        const d = new Date(startDate); d.setDate(d.getDate() + i);
        const dateStr  = d.toISOString().slice(0, 10);
        const isToday  = dateStr === todayKey();
        const isFuture = d > new Date() && !isToday;
        return { dayNum: i + 1, dateStr, isToday, isFuture, status: isFuture ? "future" : getDayCompletion(dateStr) };
      });
      const completeDays = days.filter(d => d.status === "complete").length;
      let streak = 0;
      for (let i = currentDay - 1; i >= 0; i--) { if (days[i] && days[i].status === "complete") streak++; else break; }
      return (
        <div className="page fade-in">
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 11, color: "#4a4a6a", letterSpacing: 2, textTransform: "uppercase" }}>90 Day Sprint</div>
            <div style={{ fontSize: 24, color: "#d4af37", marginTop: 4 }}>The Chain</div>
          </div>
          <div className="stat-row">
            {[["Current Day", currentDay],["Streak", streak],["Complete", completeDays],["Remaining", 90 - currentDay]].map(([l, v]) => (
              <div key={l} className="stat-box"><div className="stat-num">{v}</div><div className="stat-label">{l}</div></div>
            ))}
          </div>
          <div className="section-title">The Grid — tap any day</div>
          <div className="chain-grid">
            {days.map(day => (
              <div key={day.dayNum} className={`chain-day ${day.status} ${day.isToday ? "today" : ""}`} onClick={() => !day.isFuture && setSelected(day)}>
                {day.isToday ? "●" : day.dayNum}
              </div>
            ))}
          </div>
          <div style={{ display: "flex", gap: 16, marginBottom: 20 }}>
            {[["#5cb85c","Complete"],["#d4af37","Partial"],["#8b5cf6","Today"]].map(([c,l]) => (
              <div key={l} style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <div style={{ width: 10, height: 10, borderRadius: 3, background: c, opacity: 0.8 }} />
                <span style={{ fontSize: 10, color: "#4a4a6a" }}>{l}</span>
              </div>
            ))}
          </div>
          {selected && (
            <div className="day-detail-overlay" onClick={() => setSelected(null)}>
              <div className="day-detail-sheet" onClick={e => e.stopPropagation()}>
                <button className="close-btn" onClick={() => setSelected(null)}>×</button>
                <h2>Day {selected.dayNum} · {selected.dateStr}</h2>
                {HABITS.map(h => { const data = getDayData(selected.dateStr); return (
                  <div key={h.id} style={{ display: "flex", gap: 10, padding: "8px 0", borderBottom: "1px solid #1a1a2a", alignItems: "center" }}>
                    <span style={{ fontSize: 16 }}>{h.icon}</span>
                    <span style={{ fontSize: 13, flex: 1, color: data[h.id] ? "#a8e6a3" : "#3a3a5a" }}>{h.label}</span>
                    <span style={{ fontSize: 14, color: data[h.id] ? "#5cb85c" : "#2a2a3a" }}>{data[h.id] ? "✓" : "○"}</span>
                  </div>
                );})}
              </div>
            </div>
          )}
        </div>
      );
    }

    function WhyTab() {
      const [why, setWhy]             = useState(() => localStorage.getItem("chain_why") || WHY_DEFAULT);
      const [whySaved, setWhySaved]   = useState(false);
      const [notionKey, setNotionKey] = useState(() => localStorage.getItem("chain_notion_key") || "");
      const [keySaved, setKeySaved]   = useState(false);
      const [importMsg, setImportMsg] = useState("");
      const saveWhy = () => { localStorage.setItem("chain_why", why); setWhySaved(true); setTimeout(() => setWhySaved(false), 2000); };
      const saveKey = () => { localStorage.setItem("chain_notion_key", notionKey); setKeySaved(true); setTimeout(() => setKeySaved(false), 2000); };
      const handleImport = async e => {
        const file = e.target.files[0]; if (!file) return;
        try { const n = await importData(file); setImportMsg(`✓ Restored ${n} entries. Reload app.`); }
        catch { setImportMsg("✗ Invalid backup file."); }
        setTimeout(() => setImportMsg(""), 4000);
      };
      return (
        <div className="page fade-in">
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 11, color: "#4a4a6a", letterSpacing: 2, textTransform: "uppercase" }}>Your Foundation</div>
            <div style={{ fontSize: 24, color: "#d4af37", marginTop: 4 }}>My Why</div>
          </div>
          <div className="section-title">Why I am doing this</div>
          <textarea className="why-textarea" value={why} onChange={e => setWhy(e.target.value)} rows={6} />
          <button className={`btn btn-green ${whySaved ? "saved" : ""}`} onClick={saveWhy}>{whySaved ? "✓ Saved" : "Save My Why"}</button>
          <div className="quit-protocol">
            <div style={{ fontSize: 11, color: "#f59e0b", letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 12 }}>Anti-Quit Protocol</div>
            <div style={{ fontSize: 12, color: "#5a4a3a", marginBottom: 14, fontStyle: "italic" }}>Before you quit, do these in order.</div>
            {[
              ["Read your Why above — out loud.", "The voice that wants to quit is not you. It is fear. Fear is a liar."],
              ["Name what you're actually feeling.", "Tired? Bored? Scared? Not the same as 'this isn't working.'"],
              ["Do ONE thing only.", "Not the whole habit stack. Just one. The smallest version."],
              ["Remember the pattern.", "You have started before. The only variable is whether you finish this time."],
              ["Wait 24 hours before deciding.", "You cannot quit today. You can only wait until tomorrow."],
            ].map(([step, sub], i) => (
              <div key={i} className="quit-step">
                <div className="quit-num">{i+1}</div>
                <div><div className="quit-text" style={{ color: "#8a7a6a", fontWeight: "bold" }}>{step}</div><div className="quit-text" style={{ marginTop: 4 }}>{sub}</div></div>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 28 }}>
            <div className="section-title">Notion Settings</div>
            <div style={{ fontSize: 12, color: "#4a4a6a", marginBottom: 12, lineHeight: 1.7 }}>Your Chain database is live in your Second Brain. Paste your Notion integration key below to enable syncing.</div>
            <div className="settings-row">
              <span className="settings-label">Notion API Key</span>
              <input type="password" className="settings-input" value={notionKey} onChange={e => setNotionKey(e.target.value)} placeholder="secret_..." />
            </div>
            <button className={`btn btn-notion ${keySaved ? "saved" : ""}`} onClick={saveKey}>{keySaved ? "✓ Key Saved" : "Save API Key"}</button>
          </div>
          <div style={{ marginTop: 28 }}>
            <div className="section-title">Data Backup</div>
            <div style={{ fontSize: 12, color: "#4a4a6a", marginBottom: 10, lineHeight: 1.6 }}>Export a JSON snapshot anytime. Store in iCloud as insurance.</div>
            <button className="btn btn-gold" onClick={exportData}>↓ Export Backup</button>
            <label style={{ display: "block", textAlign: "center", padding: "14px", marginTop: 8, cursor: "pointer", borderRadius: 10, border: "1px solid #4a1010", color: "#f87171", fontSize: 13, letterSpacing: 1, textTransform: "uppercase", background: "linear-gradient(135deg, #1a0a0a, #200a0a)", fontFamily: "Georgia, serif" }}>
              ↑ Import Backup
              <input type="file" accept=".json" style={{ display: "none" }} onChange={handleImport} />
            </label>
            {importMsg && <div style={{ fontSize: 12, color: "#a8e6a3", marginTop: 8, textAlign: "center" }}>{importMsg}</div>}
          </div>
        </div>
      );
    }

    const TABS = [
      { id: "morning", icon: "☀️", label: "Morning" },
      { id: "today",   icon: "✓",  label: "Today" },
      { id: "chain",   icon: "🔗", label: "Chain" },
      { id: "why",     icon: "♥",  label: "My Why" },
    ];

    function App() {
      const [tab, setTab]         = useState("morning");
      const [started, setStarted] = useState(!!getStartDate());
      const start = () => { localStorage.setItem("chain_start", new Date().toISOString().slice(0,10)); setStarted(true); };
      if (!started) return (
        <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32, textAlign: "center" }}>
          <div style={{ fontSize: 48, marginBottom: 20 }}>🔗</div>
          <div style={{ fontSize: 28, color: "#d4af37", marginBottom: 8 }}>The Chain</div>
          <div style={{ fontSize: 14, color: "#5a5a7a", marginBottom: 32, lineHeight: 1.6 }}>90 days. No negotiation.<br />Discipline is a form of self-love.</div>
          <button onClick={start} style={{ background: "linear-gradient(135deg, #1a2e1a, #1a1a2e)", border: "1px solid #2d5a27", borderRadius: 12, color: "#a8e6a3", padding: "16px 40px", fontSize: 14, letterSpacing: 1.5, textTransform: "uppercase", cursor: "pointer", fontFamily: "Georgia, serif" }}>Begin Day 1</button>
        </div>
      );
      const renderTab = () => ({ morning: <MorningTab />, today: <TodayTab />, chain: <ChainTab />, why: <WhyTab /> })[tab];
      return (
        <div>
          {renderTab()}
          <nav className="tab-bar">
            {TABS.map(t => (
              <button key={t.id} className={`tab-btn ${tab === t.id ? "active" : ""}`} onClick={() => setTab(t.id)}>
                <span>{t.icon}</span><span>{t.label}</span>
              </button>
            ))}
          </nav>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
